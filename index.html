<!DOCTYPE html>
<html lang="it">
<head>
    <link rel="apple-touch-icon" href="icona.png">
    <link rel="icon" type="image/png" href="icona.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generatore Password TecnoFerrari</title>
    <!-- Configurazione PWA per iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- Carica Tailwind CSS per lo stile -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-title" content="TF Pass">
    <style>
        /* Stili per adattare l'app all'intero schermo del telefono */
        html, body {
            height: 100%;
            margin: 0;
            font-family: ui-sans-serif, system-ui;
        }

        #dateDisplay {
            white-space: pre-line; /* Questo dice al browser di rispettare gli invii a capo */
        }

        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center; 
            padding-top: 5rem; /* Spazio per i pulsanti di navigazione fissi */
            
            /* Sfondo locale (richiede il file 'sfondo.jpg' nella stessa cartella) */
            background-image: url('sedeTecnoFerrari.jpg'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed; 
        }
        
        .card-bg {
             background-color: rgba(255, 255, 255, 0.95); /* Leggermente più opaco per leggibilità */
             backdrop-filter: blur(5px); 
        }

        .copy-button {
            transition: transform 0.1s, background-color 0.1s;
        }

        .copy-button:active {
            transform: scale(0.95);
        }

        /* Stili per le password */
        .password-display {
             font-size: 1.5rem;         /* leggermente più piccolo per evitare overflow su schermi piccoli */
             letter-spacing: 0.05em;
             min-height: 44px;          /* Per evitare salti di layout */
             font-family: monospace;
             font-weight: bold;
        }

        /* Stili per le label Password 4 e Password 5 */
        .password-text {
            position: relative;                     /* Corrisponde a 'relative' */
            background-color: #f3f4f6;              /* Corrisponde a 'bg-gray-100' */
            padding: 0.75rem;                       /* Corrisponde a 'p-3' (12px) */
            border-radius: 0.75rem;                 /* Corrisponde a 'rounded-xl' */
            border: 2px solid #d1d5db;          /* Corrisponde a 'border-2 border-gray-300' */
            
            /* Corrisponde a 'shadow-inner' (Ombra interna per effetto incavo) */
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.06); 
            
            /* Opzionale: aggiungi font-mono e bold qui se vuoi che tutto il contenuto li erediti */
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
            font-weight: 700;
        }

        .password-label-titolo {
            display: block;               /* Corrisponde a 'block' */
            font-size: 0.875rem;          /* Corrisponde a 'text-sm' (14px) */
            font-weight: 500;             /* Corrisponde a 'font-medium' */
            color: #374151;             /* Corrisponde a 'text-gray-700' */
            margin-bottom: 0.25rem;       /* Corrisponde a 'mb-1' (4px) */
            text-align: left;             /* Corrisponde a 'text-left' */
            letter-spacing: -0.01em;      /* Tipico del font San Francisco di iOS */
            text-transform: uppercase;    /* Opzionale: rende tutto maiuscolo per un look più tecnico */
        }

        /* Stile per i pulsanti di navigazione (fissi in alto) */
        .tab-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            background-color: #10b981; /* Verde smeraldo scuro */
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
        }
        /* Stile per il pulsante non attivo */
        .tab-button {
            flex-grow: 1;
            padding: 1rem;
            text-align: center;
            font-weight: 500;
            color: #d1fae5; /* Testo verde chiaro */
            cursor: pointer;
            border-bottom: 1px solid transparent;
            transition: all 0.2s ease-in-out;
        }
        
        /* Stile per il pulsante attivo */
        .tab-button.active {
            font-size: large;
            color: #ffffff; /* Testo bianco */
            background-color: #059669; /* Verde medio */
            border-bottom: 5px solid #fcd34d; /* Linea gialla sotto */
        }
        .title {
            font-size: xx-large;
            font-weight: bolder;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            color: brown;
        }

        .btn-primary {
            /* Layout e Dimensioni */
            width: 100%;                  /* w-full */
            padding: 1rem 2rem;           /* py-4 (16px) px-8 (32px) */
            display: block;
            
            /* Colori e Testo */
            background-color: brown;    /* bg-emerald-600 */
            color: white;                 /* text-white */
            font-weight: 800;             /* font-extrabold */
            font-size: 1.25rem;           /* text-xl (20px) */
            text-align: center;
            border: none;                 /* Rimuove bordo di default del bottone */
            
            /* Forma e Ombra */
            border-radius: 1rem;          /* rounded-2xl (16px) */
            /* shadow-lg con colore azzurrino (shadow-blue-200) */
            box-shadow: 0 10px 15px -3px rgba(191, 219, 254, 0.4), 
                        0 4px 6px -2px rgba(191, 219, 254, 0.2);
            
            /* Animazioni e Transizioni */
            transition: all 0.2s ease;    /* transition-all */
            cursor: pointer;
        }

        /* Effetto al passaggio del mouse (PC) */
        .btn-primary:hover {
            background-color: rgb(126, 19, 19);    /* hover:bg-emerald-700 */
        }

        /* Effetto al tocco (iPhone/Mobile) */
        .btn-primary:active {
            transform: scale(0.95);       /* active:scale-95 (si rimpicciolisce leggermente) */
        }
    </style>
</head>

<body onload="updatePasswordDisplay()">

    <!-- INSERIMENTO PIN -->
    <div id="pin-screen" style="display: none;" class="fixed inset-0 z-[100] bg-emerald-900 flex flex-col items-center justify-center p-6 text-white">
        <img src="logoTecnoFerrari.jpg" class="w-40 mb-8 rounded-2xl shadow-lg">
        <h2 class="text-2xl font-bold mb-4">Inserire PIN</h2>
        <input type="password" id="pin-input" inputmode="numeric" 
            class="w-48 p-4 text-center text-3xl text-black rounded-xl mb-6" placeholder="****">
        <button onclick="checkPin()" class="bg-emerald-500 py-3 px-10 rounded-full font-bold shadow-lg">SBLOCCA</button>
        <p id="pin-error" class="mt-4 text-red-400 opacity-0">PIN Errato</p>
    </div>

    <!-- TASTO GENERA PASSWORD -->
    <div id="welcome-screen" style="display: none;" class="fixed inset-0 z-[90] bg-gray-100 flex flex-col items-center justify-center p-6" style="display: none;">
        <div class="card-bg p-8 rounded-3xl shadow-xl text-center max-w-sm border-b-4 border-emerald-500">
            <button onclick="goToMainPage()" class="btn-primary">GENERA PASSWORD</button>
        </div>
    </div>

    <!-- BARRA DI NAVIGAZIONE A TASTI FISSI -->
    <div class="tab-bar">
        <div class="tab-button active" onclick="showPage('page-first', this)" id="btn-page-first">Modilità 1</div>
        <div class="tab-button" onclick="showPage('page-second', this)" id="btn-page-second">Modalità 2</div>
    </div>

    <div class="container mx-auto p-6 pt-28">
        <!-- Struttura della Card Base -->
        <div class="card-bg p-6 md:p-10 rounded-3xl shadow-2xl w-full max-w-sm text-center border-t-8 border-emerald-500">
            
            <img src="logoTecnoFerrari.jpg">
            <!--<h1 class="text-3xl font-extrabold text-emerald-700 mb-2">Password</h1>-->
            <!--<h1 class="text-3xl font-extrabold text-blue-700 mb-2">Password</h1>-->
            <h1 class="title">Password</h1>

            <!-- Sezione Data (Visibile su entrambe le pagine) -->
            <div class="flex items-center justify-center gap-3 mb-6">
                <div class="relative">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    <input type="datetime-local" id="manualDate" onchange="updateFromManual()" class="absolute inset-0 opacity-0 cursor-pointer">
                </div>
                
                <p class="text-lg text-gray-600 font-semibold" id="dateDisplay">Caricamento...</p>
            </div>
            
            <!-- PAGINA 1: MODALITA' 1 -->
            <div id="page-first" class="page-content w-full" style="display: block;">
                <div class="space-y-4">
                    
                    <!-- PASSWORD 4 - MODALITA' 1 -->
                    <label class="password-label-titolo">Password 4:</label>
                    <div class="password-text">     
                        <span id="password_4_Display_first" class="password-display"></span>
                    </div>

                    <!-- PASSWORD 5 - MODALITA' 1 -->
                     <div class="admin-only">
                        <label class="password-label-titolo">Password 5:</label>
                        <div class="password-text">     
                            <span id="password_5_Display_first" class="password-display"></span>
                        </div>
                    </div>
                </div>

                <!-- Pulsante Copia Chiave 1 -->
                <!--<button onclick="copyPasswords('password_4_Display_first', 'password_5_Display_first', 'Chiave Prima Edizione')"
                        class="copy-button w-full mt-6 p-3 bg-emerald-500 text-white font-bold rounded-lg hover:bg-emerald-600 transition duration-150 shadow-lg">
                    Copia Chiave 1
                </button>-->
            </div>

            <!-- PAGINA 2: MODALITA' 2 -->
            <div id="page-second" class="page-content w-full" style="display: none;">
                <div class="space-y-4">
                    
                    <!-- PASSWORD 4 - MODALITA' 2 -->
                    <label class="password-label-titolo">Password 4:</label>
                    <div class="password-text">     
                        <span id="password_4_Display_second" class="password-display"></span>
                    </div>

                    <!-- PASSWORD 5 - MODALITA' 2 -->
                    <div class="admin-only">
                        <label class="password-label-titolo">Password 5:</label>
                        <div class="password-text">     
                            <span id="password_5_Display_second" class="password-display"></span>
                        </div>
                    </div>
                </div>

                <!-- Pulsante Copia Chiave 2 -->
                 <!--<button onclick="copyPasswords('password_4_Display_second', 'password_5_Display_second', 'Chiave Seconda Edizione')"
                        class="copy-button w-full mt-6 p-3 bg-emerald-500 text-white font-bold rounded-lg hover:bg-emerald-600 transition duration-150 shadow-lg">
                    Copia Chiave 2
                </button>-->
            </div>
            
            <!-- Messaggio di Conferma Copia -->
            <p id="copyMessage" class="text-sm text-emerald-600 font-semibold mt-4 opacity-0 transition duration-300">Copiata negli appunti!</p>
            
            <!-- Istruzioni PWA per l'Installazione su iOS -->
            <div id="installInstructions" class="mt-8 p-3 bg-yellow-100 border-l-4 border-yellow-500 text-yellow-700 rounded-lg text-xs text-left hidden">
                <p class="font-semibold mb-1">Passo Importante (Solo la prima volta):</p>
                <ol class="list-decimal list-inside">
                    <li>Tocca l'icona **Condividi** (<svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 inline-block" viewBox="0 0 20 20" fill="currentColor"><path d="M15 8V5a2 2 0 00-2-2H7a2 2 0 00-2 2v3m0 3-1 9V17a2 2 0 002 2h8a2 2 0 002-2v-3m-6 3V8M9 8h2"/></svg>) in Safari.</li>
                    <li>Seleziona **Aggiungi alla schermata Home**.</li>
                </ol>
            </div>
        </div>

        <div class="flex justify-center mt-8">
            <button onclick="logout()" 
                    class="flex items-center gap-2 px-6 py-2 bg-red-50 text-red-600 border border-red-200 rounded-full text-sm font-bold shadow-sm active:scale-95 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
                Esci
            </button>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="logic.js"></script>


</body>
</html>
